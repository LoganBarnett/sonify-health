[[heartbeats]]
command = "ping -c 1 -W 2 192.168.1.1 >/dev/null 2>&1"
crossfade_ms = 6.0
cycle_offset_secs = 0.0
cycle_secs = 15.0
name = "gateway"
phrase_gap = 0.0
playback = "clock"
poll_interval_secs = 10.0
repeat_rate = 1.0
result_mode = "exit-code-severity"

[[heartbeats.notes]]
offset = 0.0
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "star-trek-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "star-trek-error"
threshold = 1.01

[[heartbeats.notes]]
offset = 0.2
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "star-trek-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "star-trek-error"
threshold = 1.01

[[heartbeats]]
command = "ping -c 1 -W 4 8.8.8.8 >/dev/null 2>&1"
crossfade_ms = 6.0
cycle_offset_secs = 0.6
cycle_secs = 15.0
name = "internet"
phrase_gap = 0.0
playback = "clock"
poll_interval_secs = 10.0
repeat_rate = 1.0
result_mode = "exit-code-severity"

[[heartbeats.notes]]
offset = 0.0
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "star-trek-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "star-trek-error"
threshold = 1.01

[[heartbeats.notes]]
offset = 0.2
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "star-trek-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "star-trek-error"
threshold = 1.1

[[heartbeats]]
command = '''sh -c 'load=$(uptime | awk -F"load average: " "{split(\$2,a,\", \"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\$1/\$2; print (v>1?1:v)}"''''
crossfade_ms = 42.0
cycle_offset_secs = 4.8
cycle_secs = 15.0
name = "cpu"
phrase_gap = 0.0
playback = "loop"
poll_interval_secs = 5.0
repeat_rate = 1.0
result_mode = "stdout"

[[heartbeats.notes]]
offset = 0.0
volume = 1.0

[heartbeats.notes.transition]
patches = [
    "warpdrive-cpu-lo",
    "warpdrive-cpu-hi",
]
type = "gradient"

[[heartbeats.notes.transition.segments]]
intensity = 5.3
strategy = "linear"
[patches.star-trek-error]
amplitude = 0.54
chirp_ratio = 0.8
overrides = "star-trek-ok"

[patches.star-trek-ok]
amplitude = 0.327
attack_ms = 6.0
brightness = 1.82
