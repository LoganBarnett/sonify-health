# Heartbeats: internet connectivity, gateway reachability, and CPU
# load with a Star Trek inspired sound palette.
#
# Run with:
#   sonify-health --config examples/connectivity-and-cpu-star-trek.toml daemon
#
# Requires only ping and uptime, both available on macOS and Linux.

log_level = "info"
log_format = "text"

# Custom patches for the Star Trek theme.
[patches.trek-ok]
freq = 1165.4
sine_ratio = 2.37
tri_ratio = 1.22
saw_ratio = 0.02
attack_ms = 6.0
release_ms = 22.0
chirp_ratio = 1.01
stereo_pan = -0.42
reverb_mix = 0.89
echo_delay = 0.32
echo_mix = 0.33
brightness = 1.82
resonance = 3.72
sub_octave = 0.03
amplitude = 0.327
drive = 0.5

[patches.trek-cpu]
freq = 460.0
attack_ms = 8.0
release_ms = 15.0
brightness = 0.55
resonance = 0.5
echo_delay = 0.01
drive = 0.5
fm_ratio = 0.0435
fm_depth = 1.0

# Gateway reachability.
[[heartbeats]]
name = "gateway"
command = "ping -c 1 -W 2 192.168.1.1 >/dev/null 2>&1"
result_mode = "exit-code-severity"
cycle_secs = 15
cycle_offset_secs = 0

[[heartbeats.notes]]

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
threshold = 0.5
patch = "trek-ok"

[[heartbeats.notes.transition.states]]
threshold = 1.01
patch = "alarm"

# Internet connectivity.
[[heartbeats]]
name = "internet"
command = "ping -c 1 -W 4 8.8.8.8 >/dev/null 2>&1"
result_mode = "exit-code-severity"
cycle_secs = 15
cycle_offset_secs = 5

[[heartbeats.notes]]

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
threshold = 0.5
patch = "trek-ok"

[[heartbeats.notes.transition.states]]
threshold = 1.01
patch = "alarm"

# CPU load.
[[heartbeats]]
name = "cpu"
command = """sh -c 'load=$(uptime | awk -F"load average: " "{split(\\$2,a,\\", \\"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\\$1/\\$2; print (v>1?1:v)}"'"""
result_mode = "stdout"
continuous = true
poll_interval_secs = 5
cycle_secs = 15
cycle_offset_secs = 10

[[heartbeats.notes]]
volume = 0.2

[heartbeats.notes.transition]
type = "gradient"
patches = ["trek-cpu", "alarm"]
curve = 2.0
