# Heartbeat: internet connectivity + gateway reachability.
# Drone: CPU load as a continuous tone.
#
# Run with:
#   sonify-health --config examples/connectivity-and-cpu-star-trek.toml daemon
#
# Requires only ping and uptime, both available on macOS and Linux.

log_level = "info"
log_format = "text"

[timing]
slot = 0
cycle_duration_secs = 14
slot_duration_secs = 2
poll_interval_secs = 5

[patch]
freq = 1165.4094037952248
sine_ratio = 2.37
tri_ratio = 1.22
saw_ratio = 0.02
square_ratio = 0.0
attack_ms = 6.0
release_ms = 22.0
chirp_ratio = 1.01
stereo_pan = -0.42
reverb_mix = 0.89
note_seed = 0.16436162216471262
echo_delay = 0.32
echo_mix = 0.33
brightness = 1.82
resonance = 3.72
sub_octave = 0.03
vibrato_rate = 0.0
vibrato_depth = 0.48924022677787815
tremolo_rate = 0.0
tremolo_depth = 0.11162006351727571
amplitude = 0.3271526204901677
drive = 0.5
noise_mix = 0.0
crush = 0.0
fm_ratio = 0.0
fm_depth = 0.0
downsample = 0.0

[[checks]]
name = "gateway"
command = "ping -c 1 -W 2 192.168.1.1 >/dev/null 2>&1"
result_mode = "exit-code-severity"

[[checks]]
name = "internet"
command = "ping -c 1 -W 4 8.8.8.8 >/dev/null 2>&1"
result_mode = "exit-code-severity"

[[checks]]
name = "cpu"
command = """sh -c 'load=$(uptime | awk -F"load average: " "{split(\\$2,a,\\", \\"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\\$1/\\$2; print (v>1?1:v)}"'"""
result_mode = "stdout"

[[check_notes.gateway]]
freq = 3668.0
duration = 0.21

[[check_notes.gateway]]
freq = 4307.0
duration = 0.22

[[check_notes.internet]]
