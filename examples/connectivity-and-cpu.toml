# Heartbeats: internet connectivity, gateway reachability, and CPU
# load.
#
# Gateway and internet use discrete transitions (sine when healthy,
# alarm when down).  CPU uses a gradient transition between warm and
# sharp patches, driven by CPU load.
#
# Run with:
#   sonify-health --config examples/connectivity-and-cpu.toml daemon
#
# Requires only ping and uptime, both available on macOS and Linux.

log_level = "info"
log_format = "text"

# Gateway reachability.  Replace 192.168.1.1 with your actual gateway
# address (`ip route | awk '/default/ {print $3}'` on Linux,
# `netstat -nr | awk '/default/ {print $2; exit}'` on macOS).
[[heartbeats]]
name = "gateway"
command = "ping -c 1 -W 2 192.168.1.1 >/dev/null 2>&1"
result_mode = "exit-code-severity"

[heartbeats.transition]
type = "discrete"

[[heartbeats.transition.states]]
threshold = 0.5
patch = "sine"

[[heartbeats.transition.states]]
threshold = 1.01
patch = "alarm"

# Internet connectivity via a well-known public DNS resolver.
[[heartbeats]]
name = "internet"
command = "ping -c 1 -W 4 8.8.8.8 >/dev/null 2>&1"
result_mode = "exit-code-severity"

[heartbeats.transition]
type = "discrete"

[[heartbeats.transition.states]]
threshold = 0.5
patch = "sine"

[[heartbeats.transition.states]]
threshold = 1.01
patch = "alarm"

# CPU load as a 0.0-1.0 value: 1-minute load average divided by CPU
# count, clamped to 1.0.  Works unprivileged on both macOS and Linux.
[[heartbeats]]
name = "cpu"
command = """sh -c 'load=$(uptime | awk -F"load average: " "{split(\\$2,a,\\", \\"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\\$1/\\$2; print (v>1?1:v)}"'"""
result_mode = "stdout"
continuous = true
volume = 0.2
poll_interval_secs = 5

[heartbeats.transition]
type = "gradient"
patches = ["warm", "sharp"]
