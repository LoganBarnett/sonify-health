# Heartbeats: internet connectivity, gateway reachability, and CPU
# load.
#
# Gateway and internet use discrete transitions (sine when healthy,
# alarm when down).  CPU uses a gradient transition between warm and
# sharp patches, driven by CPU load.
#
# Run with:
#   sonify-health --config examples/connectivity-and-cpu.toml daemon
#
# Requires only ping and uptime, both available on macOS and Linux.

log_level = "info"
log_format = "text"

# Ping flags use short forms for BSD (macOS) compatibility.
# -c 1: send one packet (--count).  -W N: seconds to wait for a
# reply (--linger).
#
# Gateway reachability.  The default-route lookup tries Linux's
# `ip route` first, then falls back to macOS's `route -n get
# default`, so the same config works on both.  If neither command
# yields a gateway (no default route configured), ping is invoked
# with an empty argument and exits non-zero — registering as
# "down", which is the correct signal.
[[heartbeats]]
name = "gateway"
command = '''
gw=$(ip route show default 2>/dev/null | awk '{print $3; exit}')
[ -z "$gw" ] && gw=$(route -n get default 2>/dev/null | awk '/gateway/ {print $2}')
ping -c 1 -W 2 "$gw"
'''
result_mode = "exit-code"
cycle_secs = 15
cycle_offset_secs = 0

[[heartbeats.notes]]

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
threshold = 0.5
patch = "sine"

[[heartbeats.notes.transition.states]]
threshold = 1.01
patch = "alarm"

# Internet connectivity via OpenDNS (208.67.222.222).
[[heartbeats]]
name = "internet"
command = "ping -c 1 -W 4 208.67.222.222"
result_mode = "exit-code"
cycle_secs = 15
cycle_offset_secs = 5

[[heartbeats.notes]]

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
threshold = 0.5
patch = "sine"

[[heartbeats.notes.transition.states]]
threshold = 1.01
patch = "alarm"

# CPU load as a 0.0-1.0 value: 1-minute load average divided by CPU
# count, clamped to 1.0.  Works unprivileged on both macOS and Linux.
[[heartbeats]]
name = "cpu"
command = """sh -c 'load=$(uptime | awk -F"load average: " "{split(\\$2,a,\\", \\"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\\$1/\\$2; print (v>1?1:v)}"'"""
result_mode = "stdout"
continuous = true
poll_interval_secs = 5
cycle_secs = 15
cycle_offset_secs = 10

[[heartbeats.notes]]
volume = 0.2

[heartbeats.notes.transition]
type = "gradient"
patches = ["warm", "sharp"]
