[[heartbeats]]
command = '''
gw=$(ip route show default 2>/dev/null | awk '{print $3; exit}')
[ -z "$gw" ] && gw=$(route -n get default 2>/dev/null | awk '/gateway/ {print $2}')
ping -c 1 -W 2 "$gw"
'''
crossfade_ms = 6.0
cycle_offset_secs = 0.0
cycle_secs = 15.0
name = "gateway"
phrase_gap = 0.0
playback = "clock"
poll_interval_secs = 10.0
repeat_rate = 1.0
result_mode = "exit-code"
tiers = []

[[heartbeats.notes]]
offset = 0.0
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "reactor-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "reactor-error"
threshold = 1.01

[[heartbeats]]
command = "ping -c 1 -W 4 208.67.222.222"
crossfade_ms = 6.0
cycle_offset_secs = 0.6
cycle_secs = 15.0
name = "internet"
phrase_gap = 0.0
playback = "clock"
poll_interval_secs = 10.0
repeat_rate = 1.0
result_mode = "exit-code"
tiers = []

[[heartbeats.notes]]
offset = 0.0
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "reactor-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "reactor-error"
threshold = 1.01

[[heartbeats.notes]]
offset = 0.15
volume = 1.0

[heartbeats.notes.transition]
type = "discrete"

[[heartbeats.notes.transition.states]]
patch = "reactor-ok"
threshold = 0.5

[[heartbeats.notes.transition.states]]
patch = "reactor-error"
threshold = 1.1

[[heartbeats]]
command = '''sh -c 'load=$(uptime | awk -F"load average: " "{split(\$2,a,\", \"); print a[1]}"); cpus=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1); echo "$load $cpus" | awk "{v=\$1/\$2; print (v>1?1:v)}"''''
crossfade_ms = 0.0
cycle_offset_secs = 0.0
cycle_secs = 15.0
name = "cpu"
phrase_gap = 0.0
playback = "continuous"
poll_interval_secs = 5.0
repeat_rate = 1.0
result_mode = "stdout"
tiers = []

[[heartbeats.notes]]
offset = 0.0
volume = 0.55

[heartbeats.notes.transition]
patches = [
    "reactor-cpu-lo",
    "reactor-cpu-hi",
]
type = "gradient"

[[heartbeats.notes.transition.segments]]
intensity = 2.0
strategy = "ease-in"

[patches.reactor-cpu-hi]
freq = 18.0
overrides = "reactor-cpu-lo"

