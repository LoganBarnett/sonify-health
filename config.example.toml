# sonify-health configuration
# Copy to config.toml and customize as needed.

log_level = "info"   # trace, debug, info, warn, error
log_format = "text"  # text, json
listen = "127.0.0.1:3000"  # Web server bind address (daemon mode)
# audio_device = "My USB DAC"  # Omit to use system default

# Custom patch definitions.  Each key is a patch name.
# [patches.warm]
# freq = 220.0
# sine_ratio = 0.9
# attack_ms = 60.0
# release_ms = 300.0

# Each [[heartbeats]] entry defines a probe command and one or more
# notes that map its metric to patches from the library.
#
# playback modes:
#   "clock"      — one-shot on a wall-clock cycle (default)
#   "loop"       — repeats with a configurable phrase gap
#   "continuous" — streams audio, crossfading on metric changes
#
# result_mode:
#   "exit-code" — exit 0/1/2 maps to thresholds
#   "stdout"    — command prints a metric value (0.0–1.0)

# [[heartbeats]]
# name = "gateway"
# command = "ping -c 1 8.8.8.8"
# result_mode = "exit-code"
# # playback = "clock"  (default)
# # cycle_secs = 15.0
# # cycle_offset_secs = 0.0
#
# [[heartbeats.notes]]
# volume = 0.3
# offset = 0.0
#
# [heartbeats.notes.transition]
# type = "discrete"
#
# [[heartbeats.notes.transition.states]]
# threshold = 0.5
# patch = "sine"
#
# [[heartbeats.notes.transition.states]]
# threshold = 1.01
# patch = "alarm"

# [[heartbeats]]
# name = "cpu"
# command = "/path/to/cpu-load"
# result_mode = "stdout"
# playback = "continuous"
# poll_interval_secs = 5.0
# crossfade_ms = 6.0
#
# [[heartbeats.notes]]
# volume = 0.2
#
# [heartbeats.notes.transition]
# type = "gradient"
# patches = ["warm", "sharp"]
