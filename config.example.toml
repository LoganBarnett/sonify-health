# sonify-health configuration
# Copy to config.toml and customize as needed.

log_level = "info"   # trace, debug, info, warn, error
log_format = "text"  # text, json
listen = "127.0.0.1:3000"  # Web server bind address (daemon mode)

# Override hostname-derived voice parameters.
# Omitted fields use the hash-derived default.
# [voice]
# scale_key = "example.com"  # Pentatonic root (default: domain from hostname)
# base_freq = 523.0
# sine_ratio = 0.8
# tri_ratio = 0.1
# saw_ratio = 0.05
# attack_ms = 40.0
# release_ms = 150.0
# chirp_ratio = 1.2    # Onset pitch sweep (1.0 = none, 1.5 = perfect fifth)
# stereo_pan = 0.0     # Drone stereo placement (-0.3..0.3)
# reverb_mix = 0.4     # Wet/dry reverb blend (0.3..0.6)

# Heartbeat timing and checks (used by `daemon` subcommand).
[heartbeat]
slot = 0                  # This machine's slot in the cycle.
cycle_duration_secs = 14  # Total cycle covering all machines.
slot_duration_secs = 2    # Time budget per machine.

# Each check maps to one boop.
# result_mode: "exit-code" (0/1/2) or "stdout" (prints value).

# [[heartbeat.checks]]
# name = "local"
# command = "/path/to/check-lan"
# result_mode = "exit-code"

# [[heartbeat.checks]]
# name = "external"
# command = "/path/to/check-external"
# result_mode = "stdout"

# [[heartbeat.checks]]
# name = "purpose"
# command = "/path/to/check-gpu"
# result_mode = "exit-code"

# Drone layer: continuous stress sonification.
# [drone]
# poll_interval_secs = 5  # How often to run metric commands.
#
# [[drone.metrics]]
# name = "gpu"
# command = "/path/to/gpu-load"
# result_mode = "stdout"
# register = "low"
#
# [[drone.metrics]]
# name = "memory"
# command = "/path/to/mem-pressure"
# result_mode = "stdout"
# register = "mid"
